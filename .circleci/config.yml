version: 2.1

orbs:
  node: circleci/node@5.0.3

workflows:
    test-workflow:
      jobs:
        - test
            
jobs:
  test:
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: npm install
      - run: npm run build
      - run: npm run test