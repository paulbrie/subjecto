name: CI

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18.x, 20.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run linter
              run: npm run lint

            - name: Run tests
              run: npm test

            - name: Build
              run: npm run build

            - name: Check bundle sizes
              run: |
                  echo "📦 Bundle Sizes:"
                  echo "CJS:"
                  du -h dist/cjs/index.js dist/cjs/deepSubject.js dist/cjs/subject.js 2>/dev/null || echo "CJS files not found"
                  echo ""
                  echo "ESM:"
                  du -h dist/esm/index.js dist/esm/deepSubject.js dist/esm/subject.js 2>/dev/null || echo "ESM files not found"
                  echo ""
                  echo "Total dist size:"
                  du -sh dist/

            - name: Upload coverage to Codecov
              if: matrix.node-version == '20.x'
              uses: codecov/codecov-action@v4
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: false

